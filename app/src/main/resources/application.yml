spring:
  application:
    name: erp-assurance-tunisie
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: erp-assurance-tunisie-jwt-secret-key-2024-must-be-at-least-256-bits-long
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:4200

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
