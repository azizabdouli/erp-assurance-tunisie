spring:
  datasource:
    url: jdbc:mysql://localhost:3306/test_db
    username: test_user
    password: test_pass
  cache:
    type: redis
  messaging:
    queue:
      name: test-queue
  security:
    oauth2:
      client:
        registration:
          oauth:
            client-id: test-client-id
            client-secret: test-client-secret
            redirect-uri: http://localhost:8080/login/oauth2/code/test
  logging:
    level:
      root: DEBUG
  openapi:
    title: Test API
    version: 1.0
