spring:
  datasource:
    url: jdbc:mysql://localhost:3306/prod_db
    username: prod_user
    password: prod_pass
  cache:
    type: ehcache
  messaging:
    queue:
      name: prod-queue
  security:
    oauth2:
      client:
        registration:
          oauth:
            client-id: prod-client-id
            client-secret: prod-client-secret
            redirect-uri: http://localhost:8080/login/oauth2/code/prod
  logging:
    level:
      root: ERROR
  openapi:
    title: Prod API
    version: 1.0
